<svg width="1000" height="24" viewBox="0 0 1000 24" fill="none" xmlns="http://www.w3.org/2000/svg">

    <defs>

        <linearGradient id="line" x1="0" y1="12" x2="1000" y2="12">
            <stop offset="0%" stop-color="#30363D"/>
            <stop offset="50%" stop-color="#58A6FF"/>
            <stop offset="100%" stop-color="#30363D"/>
        </linearGradient>

    </defs>

    <!-- Linha esquerda -->
    <line
        x1="0"
        y1="12"
        x2="250"
        y2="12"
        stroke="url(#line)"
        stroke-width="2"/>

    <!-- Badge -->
    <rect
        x="250"
        y="4"
        width="500"
        height="16"
        rx="8"
        fill="#58A6FF"/>

    <!-- < -->
    <polyline
        points="492,8 487,12 492,16"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"/>

    <!-- / -->
    <line
        x1="498"
        y1="17"
        x2="502"
        y2="7"
        stroke="#FFFFFF"
        stroke-width="2"
        stroke-linecap="round"/>

    <!-- > -->
    <polyline
        points="508,8 513,12 508,16"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"/>

    <!-- Linha direita -->
    <line
        x1="750"
        y1="12"
        x2="1000"
        y2="12"
        stroke="url(#line)"
        stroke-width="2"/>

</svg>
